name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  resilience:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Bring up the composed stack (VaultChain from pinned remote git context + Toxiproxy)
        run: npm run stack:up

      - name: Run resilience suite
        run: npx playwright test

      - name: Run falsification harness (every test must fail under sabotage)
        run: npm run falsify

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 200

      - name: Publish Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Tear down
        if: always()
        run: npm run stack:down
